  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    Sveltia CMS — fork moderne de Decap CMS (ex-Netlify CMS)
    Auth : GitHub direct via le proxy hébergé auth.sveltia.app (gratuit).
    Config : /admin/config.yml (côté de ce fichier).
    Doc utilisateur : /docs/cms-admin.md
  -->
  <script type="module" src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" onload="document.getElementById('loading').remove()"></script>
